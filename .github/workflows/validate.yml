name: Validate Skills

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate repository structure
        env:
          VENDOR_NAME: skom
          AUTHOR_URL: https://www.skom.de
        run: |
          ./.skill-repo-tools/scripts/validate-skill.sh .

  validate-skills:
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.skills.outputs.skills }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - id: skills
        run: |
          skills=$(find ./skills -maxdepth 1 -type d -not -path './skills' -exec basename {} \; | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "skills=$skills" >> $GITHUB_OUTPUT

  validate-each:
    needs: validate-skills
    runs-on: ubuntu-latest
    strategy:
      matrix:
        skill: ${{ fromJson(needs.validate-skills.outputs.skills) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate ${{ matrix.skill }}
        uses: Flash-Brew-Digital/validate-skill@v1
        with:
          path: ./skills/${{ matrix.skill }}
          enforce-directories: references,agents
          validate-references: "true"
